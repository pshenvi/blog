<!DOCTYPE html>
<html>

<head>
    <title>Pradyumna Shenvi's Blog</title>
    <link rel="stylesheet" href="static/styles.css"/>
</head>

<body>

    <div class="sitemap">

        <h3>Click to View</h1>

        <ul>
            {% for post in posts %}
            <li>
                <a href="/{{ post.slug }}">
                    {{ post.title }}
                </a>
            </li>
            {% endfor %}
        </ul>

    </div>

</body>

</html>
