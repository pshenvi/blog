<!DOCTYPE html>
<html lang="en">

<head>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
</head>

<body>

    <div class="article-container">

        <a href="/">Home</a>

        <h1>{{ title }}</h1>

        <p>Created: {{ date }}</p>

        <p>Updated: {{ updated }}</p>

        <p>Description: {{ description }} </p>

        {{ content | safe }}

    </div>

</body>

</html>
