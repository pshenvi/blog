<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
</head>

<body>

    <div>

        <nav>
            <a href="/">Home</a>
        </nav>

        <div>
            <h1>{{ title }}</h1>

            <p>Created: {{ date }}</p>

            <p>Updated: {{ updated }}</p>

            <p>Description: {{ description }} </p>
        </div>

        <div>
            {{ content | safe }}
        </div>

    </div>

</body>

</html>
