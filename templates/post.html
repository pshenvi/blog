<!DOCTYPE html>
<html>

<head>
    <title>{{ title }}</title>
</head>

<body>

    <div class="blog_details">

        <a href="/">Home</a>

        <h1>{{ title }}</h1>

        <p>Created: {{ date }}</p>

        <p>Updated: {{ updated }}</p>

        <p>Description: {{ description }} </p>

        <hr>

    </div>

    <div class="blogpost">

        {{ content | safe }}

    </div>

</body>

</html>
